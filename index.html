<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌿 毛豆的植物图鉴</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #f0f9f0;
      --card: #ffffff;
      --accent: #4CAF50;
      --accent-dark: #388E3C;
      --text: #2d2d2d;
      --text-light: #666;
      --border: #e0e0e0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }
    
    header {
      text-align: center;
      padding: 2rem 1rem;
      background: linear-gradient(135deg, #4CAF50, #8BC34A);
      color: white;
      border-radius: 0 0 24px 24px;
      margin-bottom: 2rem;
    }
    
    h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    
    .subtitle {
      opacity: 0.9;
      font-size: 0.95rem;
    }
    
    .search-box {
      margin-bottom: 1.5rem;
    }
    
    .search-box input {
      width: 100%;
      padding: 1rem;
      border: 2px solid var(--accent);
      border-radius: 12px;
      font-size: 1rem;
      background: white;
      outline: none;
    }
    
    .search-box input:focus {
      border-color: var(--accent-dark);
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.2);
    }
    
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .tab {
      padding: 0.6rem 1.2rem;
      border: 2px solid var(--accent);
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .tab:hover {
      background: #f5f5f5;
    }
    
    .tab.active {
      background: var(--accent);
      color: white;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }
    
    .card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    
    .card-img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: #e8f5e9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    
    .card-body {
      padding: 0.75rem;
    }
    
    .card-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    
    .card-en {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }
    
    .card-tag {
      display: inline-block;
      background: #e8f5e9;
      color: var(--accent-dark);
      padding: 0.2rem 0.5rem;
      border-radius: 8px;
      font-size: 0.7rem;
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    
    .modal.show {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: 20px;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-header {
      height: 200px;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      background: #e8f5e9;
    }
    
    .modal-body {
      padding: 1.5rem;
    }
    
    .modal-name {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    
    .modal-en {
      color: var(--text-light);
      margin-bottom: 1rem;
    }
    
    .modal-section {
      margin-bottom: 1rem;
    }
    
    .modal-section h3 {
      font-size: 0.9rem;
      color: var(--accent-dark);
      margin-bottom: 0.5rem;
    }
    
    .modal-section p {
      line-height: 1.6;
      color: var(--text);
    }
    
    .close-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: white;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      display: none;
    }
    
    .modal.show .close-btn {
      display: block;
    }
    
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-light);
      font-size: 0.85rem;
    }
    
    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🌿 毛豆的植物图鉴</h1>
    <p class="subtitle">认识身边的野菜和花草</p>
  </header>
  
  <div class="container">
    <div class="search-box">
      <input type="text" id="search" placeholder="🔍 搜索植物...">
    </div>
    
    <div class="tabs" id="tabs">
      <button class="tab active" data-filter="all">全部</button>
      <button class="tab" data-filter="野菜">🌱 野菜</button>
      <button class="tab" data-filter="花草">🌸 花草</button>
      <button class="tab" data-filter="树木">🌳 树木</button>
    </div>
    
    <div class="grid" id="grid"></div>
  </div>
  
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal()">×</button>
    <div class="modal-content">
      <div class="modal-header" id="modal-img"></div>
      <div class="modal-body">
        <div class="modal-name" id="modal-name"></div>
        <div class="modal-en" id="modal-en"></div>
        <div class="modal-section">
          <h3>📖 介绍</h3>
          <p id="modal-desc"></p>
        </div>
        <div class="modal-section">
          <h3>🎯 特点</h3>
          <p id="modal-feature"></p>
        </div>
        <div class="modal-section">
          <h3>🌍 在哪里可以找到</h3>
          <p id="modal-location"></p>
        </div>
      </div>
    </div>
  </div>
  
  <footer>
    <p>🌿 毛豆的植物图鉴 · 认识自然 · 快乐成长</p>
  </footer>
  
  <script>
    const plants = [
      {
        id: 1,
        name: '荠菜',
        en: 'Shepherd\'s Purse',
        emoji: '🥬',
        category: '野菜',
        desc: '春天最常见的野菜，叶子呈羽毛状，开小白花。荠菜饺子是很多人童年记忆里的味道！',
        feature: '营养丰富，含有丰富的维生素C和钙。可以凉拌、做馅、煮汤。',
        location: '田野、路边、花园里，春天到处都能找到'
      },
      {
        id: 2,
        name: '蒲公英',
        en: 'Dandelion',
        emoji: '🌼',
        category: '野菜',
        desc: '黄色的小花随着风飘散，种子会变成白色的小绒球，轻轻一吹就像一把把小伞飘向天空。',
        feature: '可以入药，有清热解毒的功效。嫩叶可以泡茶，花朵可以做成蒲公英蜂蜜。',
        location: '草地、路旁、田野，几乎无处不在'
      },
      {
        id: 3,
        name: '马齿苋',
        en: 'Purslane',
        emoji: '🌿',
        category: '野菜',
        desc: '趴在地上生长的野菜，茎是红色的，叶子圆圆的厚厚的，摸起来肉肉的。',
        feature: '含有丰富的Omega-3脂肪酸。可以凉拌、炒菜，味道有点酸酸的。',
        location: '菜园、田埂、路边，喜欢阳光充足的地方'
      },
      {
        id: 4,
        name: '薰衣草',
        en: 'Lavender',
        emoji: '💜',
        category: '花草',
        desc: '紫色的小花一串串的，闻起来香香的，让人感觉很放松。传说薰衣草可以帮助睡眠哦！',
        feature: '可以做成香包、香精油。有安神、助眠的功效。',
        location: '花园、花店、公园'
      },
      {
        id: 5,
        name: '向日葵',
        en: 'Sunflower',
        emoji: '🌻',
        category: '花草',
        desc: '大大圆圆的黄色花盘，总是追着太阳转，好像一个大大的笑脸！',
        feature: '种子就是葵花籽，可以吃也可以榨油。花盘很大，小朋友可以躲在下面乘凉。',
        location: '农田、花园、公园'
      },
      {
        id: 6,
        name: '郁金香',
        en: 'Tulip',
        emoji: '🌷',
        category: '花草',
        desc: '花杯形状的美丽花朵，颜色多样，有红色、黄色、粉色、紫色……像一个个精致的高脚杯。',
        feature: '是荷兰的国花。春天开花，花期不长但非常美丽。',
        location: '公园、花园、花展'
      },
      {
        id: 7,
        name: '樱花',
        en: 'Cherry Blossom',
        emoji: '🌸',
        category: '花草',
        desc: '粉色的花瓣轻轻飘落，像下了一场粉色的雨。春天最浪漫的风景！',
        feature: '花期很短，只有几天。樱花落下的时候非常美丽，叫"樱吹雪"。',
        location: '公园、街道、大学校园'
      },
      {
        id: 8,
        name: '银杏',
        en: 'Ginkgo',
        emoji: '🍂',
        category: '树木',
        desc: '叶子像一把小扇子，秋天会变成金黄色，落下来像铺了一层金色的地毯。',
        feature: '是活化石，恐龙时代就存在了！种子（白果）可以食用，但要去掉外皮。',
        location: '街道、公园、古寺庙'
      },
      {
        id: 9,
        name: '松树',
        en: 'Pine',
        emoji: '🌲',
        category: '树木',
        desc: '一年四季都是绿色的，叶子像细细的针，冬天也不落叶，很坚强！',
        feature: '可以长得很高很大。松果是小松鼠的最爱。松针可以用来泡茶。',
        location: '山林、公园、寺庙'
      },
      {
        id: 10,
        name: '桂花',
        en: 'Osmanthus',
        emoji: '🌼',
        category: '花草',
        desc: '小小的黄色花朵，香气扑鼻，闻起来甜甜的。桂花开了，整个街道都能闻到香味！',
        feature: '可以做桂花糕、桂花茶、桂花糖。香气可以持续很久。',
        location: '公园、街道、庭院'
      },
      {
        id: 11,
        name: '野菊花',
        en: 'Wild Chrysanthemum',
        emoji: '🌻',
        category: '花草',
        desc: '小小的黄色花，秋天开在路边田埂，像一个个小太阳。',
        feature: '可以泡茶，有清热明目的功效。生命力很强，到处都能生长。',
        location: '田野、路边、山坡'
      },
      {
        id: 12,
        name: '艾草',
        en: 'Mugwort',
        emoji: '🌿',
        category: '野菜',
        desc: '叶子背面是白色的，有特殊的香味。端午节用来挂门口，可以驱蚊虫！',
        feature: '可以做艾灸、泡脚。清明节可以做青团。有淡淡的草药香。',
        location: '田野、路边、山坡'
      }
    ];
    
    let currentFilter = 'all';
    
    function renderCards(filter = 'all', search = '') {
      const grid = document.getElementById('grid');
      let filtered = plants;
      
      if (filter !== 'all') {
        filtered = filtered.filter(p => p.category === filter);
      }
      
      if (search) {
        const s = search.toLowerCase();
        filtered = filtered.filter(p => 
          p.name.includes(s) || 
          p.en.toLowerCase().includes(s) ||
          p.desc.includes(s)
        );
      }
      
      grid.innerHTML = filtered.map(p => `
        <div class="card" onclick="openModal(${p.id})">
          <div class="card-img">${p.emoji}</div>
          <div class="card-body">
            <div class="card-name">${p.name}</div>
            <div class="card-en">${p.en}</div>
            <span class="card-tag">${p.category}</span>
          </div>
        </div>
      `).join('');
    }
    
    function openModal(id) {
      const p = plants.find(plant => plant.id === id);
      if (!p) return;
      
      document.getElementById('modal-img').textContent = p.emoji;
      document.getElementById('modal-name').textContent = p.name;
      document.getElementById('modal-en').textContent = p.en;
      document.getElementById('modal-desc').textContent = p.desc;
      document.getElementById('modal-feature').textContent = p.feature;
      document.getElementById('modal-location').textContent = p.location;
      document.getElementById('modal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('show');
      document.body.style.overflow = '';
    }
    
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
    
    document.getElementById('tabs').addEventListener('click', (e) => {
      if (e.target.classList.contains('tab')) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        e.target.classList.add('active');
        currentFilter = e.target.dataset.filter;
        renderCards(currentFilter, document.getElementById('search').value);
      }
    });
    
    document.getElementById('search').addEventListener('input', (e) => {
      renderCards(currentFilter, e.target.value);
    });
    
    // Init
    renderCards();
  </script>
</body>
</html>
